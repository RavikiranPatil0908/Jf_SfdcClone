<template>
    <lightning-card>
        <div class="slds-modal__header" style="margin-top: 0;margin-block: 0;padding-top: 0;">
            <h1 class="slds-modal__title slds-hyphenate">Select option to match with student image</h1>
        </div>
        <div class="slds-modal__content slds-p-around_medium" style="margin-bottom: 0px;">
            <span>Please select the option to proceed</span>
            <div class="slds-col slds-size_2-of-1">
                <lightning-combobox value={selectedOption} options={docType} onchange={handleChange}
                    required="true"></lightning-combobox>
            </div>
        </div>
        <footer class="slds-modal__footer">
            <lightning-button class="slds-m-around_small" label="Submit" onclick={handleSave}
                variant="brand"></lightning-button>
            <lightning-button class="slds-m-around_small" label="Cancel" onclick={handleCancel}
                variant="brand"></lightning-button>
        </footer>
    </lightning-card>
</template>

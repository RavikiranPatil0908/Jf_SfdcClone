<template>
    <lightning-card>
        <div class="slds-modal__header">
            <h1 class="slds-modal__title slds-hyphenate">Update either Email or Mobile</h1>
        </div>
        <div class="slds-modal__content slds-p-around_medium">
            <span>Request to update email address or mobile number</span>
            <div class="slds-col slds-size_2-of-1">
                <lightning-combobox label="Kindly select your request:" value={updateType} options={updateOptions}
                    onchange={handleChange} required="true"></lightning-combobox>
            </div>
        </div>
        <footer class="slds-modal__footer">
            <lightning-button class="slds-m-around_small" label="Update Email or Mobile" onclick={handleSave}
                variant="brand"></lightning-button>
            <lightning-button class="slds-m-around_small" label="Cancel" onclick={handleCancel}
                variant="brand"></lightning-button>
        </footer>
    </lightning-card>
</template>

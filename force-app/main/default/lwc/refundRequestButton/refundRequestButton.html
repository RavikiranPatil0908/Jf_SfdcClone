<template>
    <lightning-card>
        <div class="slds-modal__header">
            <h1 class="slds-modal__title slds-hyphenate">Request to Cancel Admission or Registration</h1>
        </div>
        <div class="slds-modal__content slds-p-around_medium">
            <div class="slds-col slds-size_2-of-1">
                <lightning-combobox label="Refund Type" value={refundType} options={refundOptions}
                    onchange={handleChange} required="true"></lightning-combobox>
            </div>
        </div>
        <footer class="slds-modal__footer">
            <lightning-button class="slds-m-around_small" label="Save" onclick={handleSave}
                variant="brand"></lightning-button>
            <lightning-button class="slds-m-around_small" label="Cancel" onclick={handleCancel}
                variant="brand"></lightning-button>
        </footer>
    </lightning-card>
</template>
